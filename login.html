<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giris Yap</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937, #374151);
      color: #111827;
      padding: 16px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.28);
    }

    .title {
      margin: 0 0 6px;
      font-size: 24px;
      color: #111827;
    }

    .subtitle {
      margin: 0 0 18px;
      color: #4b5563;
      font-size: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 16px;
      gap: 12px;
      font-size: 14px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #374151;
    }

    .forgot {
      color: #2563eb;
      text-decoration: none;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px;
      background: #111827;
      color: #ffffff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #1f2937;
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: #4b5563;
    }

    .footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1 class="title">Giris Yap</h1>
    <p class="subtitle">Hesabina erismek icin bilgilerini gir.</p>

    <form action="#" method="post">
      <div class="field">
        <label for="email">E-posta</label>
        <input id="email" name="email" type="email" placeholder="ornek@mail.com" required>
      </div>

      <div class="field">
        <label for="password">Sifre</label>
        <input id="password" name="password" type="password" placeholder="********" required>
      </div>

      <div class="row">
        <label class="remember" for="remember">
          <input id="remember" name="remember" type="checkbox">
          Beni hatirla
        </label>
        <a class="forgot" href="#">Sifremi unuttum</a>
      </div>

      <button type="submit">Giris Yap</button>
    </form>

    <p class="footer">Hesabin yok mu? <a href="#">Kayit Ol</a></p>
  </main>
</body>
</html>
